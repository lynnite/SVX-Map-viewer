<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map & Image Viewer</title>
  <link rel="stylesheet" href="style.css?v=10">
  <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Map Collection</h2>
    </div>
    
    <ul id="image-list">
      <li data-src="images/maints-0.webp" class="active">Cargo Carriage</li>
      <li data-src="images/kutjevo-0.webp">Kutjevo Refinery</li>
      <li data-src="images/trijent-0.webp">Trijent Dam</li>
    </ul>
  </aside>

  <main class="viewport">
    <div id="panzoom-container">
      <img id="map-image" src="images/maints-0.webp" alt="Map Viewer">
    </div>

    <div class="floating-controls">
      <button id="zoom-in" title="Zoom In">+</button>
      <button id="zoom-out" title="Zoom Out">−</button>
      <button id="reset-view" title="Reset View">Reset</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
